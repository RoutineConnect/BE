spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: "jdbc:mysql://localhost/test_database"
    username: "test"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
